# CD: main -> Function deploy -> Fabric test -> (environment approval) -> Fabric prod.
#
# Auth is OIDC (workload identity federation) — no publish profiles or secrets
# beyond the three federated-credential IDs. One-time setup:
#   1. Entra app registration + federated credential for this repo
#      (subject: repo:<owner>/marta-pulse-gh:ref:refs/heads/main and
#       repo:<owner>/marta-pulse-gh:environment:production).
#   2. Repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.
#   3. Repo variables: FUNCTION_APP_NAME, FUNCTION_APP_RG,
#      FABRIC_WORKSPACE_ID_TEST, FABRIC_WORKSPACE_ID_PROD.
#   4. GitHub environment "production" with a required-reviewers protection rule
#      (replaces the ADO marta-pulse-prod approval gate).
#   5. The service principal: contributor on the Function's resource group,
#      admin on the test/prod Fabric workspaces, and the tenant setting
#      "service principals can use Fabric APIs" enabled.
name: cd-fabric-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC login
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install build pytest
          pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests -q
      - name: Build wheel
        run: python -m build --wheel --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  deploy-function:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - name: Package Function with wheel
        run: |
          WHEEL=$(basename dist/*.whl)
          cp "dist/$WHEEL" functions/ingest_gtfs_rt/
          echo "./$WHEEL" >> functions/ingest_gtfs_rt/requirements.txt
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Flex Consumption Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package: functions/ingest_gtfs_rt
          remote-build: true

  deploy-fabric-test:
    needs: build
    # Skips cleanly until the test workspace exists and its ID is configured
    # as a repo variable (Phase 8).
    if: vars.FABRIC_WORKSPACE_ID_TEST != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install fabric-cicd azure-identity
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Publish Fabric items (test)
        run: |
          python deploy/deploy_fabric.py \
            --workspace-id "${{ vars.FABRIC_WORKSPACE_ID_TEST }}" \
            --environment test \
            --repo-dir fabric

  deploy-fabric-prod:
    needs: [deploy-fabric-test, deploy-function]
    if: vars.FABRIC_WORKSPACE_ID_PROD != ''
    runs-on: ubuntu-latest
    environment: production   # approval gate lives here
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install fabric-cicd azure-identity
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Publish Fabric items (prod)
        run: |
          python deploy/deploy_fabric.py \
            --workspace-id "${{ vars.FABRIC_WORKSPACE_ID_PROD }}" \
            --environment prod \
            --repo-dir fabric
